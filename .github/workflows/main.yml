name: semgrep
on: [push, pull_request]

jobs:
  define-matrix:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.set-matrix.outputs.plugins }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          # Find all subdirectories in plugins/ and convert to JSON array
          PLUGINS=$(find plugins -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort -u | jq -R . | jq -s . | tr -d '[:space:]')
          echo "plugins=$PLUGINS" >> $GITHUB_OUTPUT

  scan:
    needs: define-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: ${{ fromJson(needs.define-matrix.outputs.plugins) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep and generate JSON report
        run: |
          mkdir -p reports
          semgrep scan --config=./rules/wp-csrf.yml plugins/${{ matrix.plugin }} --json --output=reports/${{ matrix.plugin }}_results.json || true

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report-${{ matrix.plugin }}
          path: reports/${{ matrix.plugin }}_results.json
          retention-days: 1
