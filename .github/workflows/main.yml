name: semgrep
on: [push]

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep and generate JSON report
        run: |
          mkdir -p reports
          semgrep scan --config=auto --json --output=reports/semgrep_results.json || true
        # '|| true' prevents blocking findings from stopping the workflow

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/semgrep_results.json
          retention-days: 1
